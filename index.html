<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memuat Video...</title>

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

/* LOADING SCREEN */
#loading {
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.loader {
    width:50px;
    height:50px;
    border:5px solid #333;
    border-top:5px solid red;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    100% { transform:rotate(360deg); }
}

#main {
    display:none;
    padding:20px;
    max-width:800px;
    margin:auto;
}

.video-box {
    position:relative;
    cursor:pointer;
}

video {
    width:100%;
    border-radius:12px;
}

.play-btn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:50%;
}

.progress {
    width:100%;
    height:6px;
    background:#333;
    margin-top:10px;
}

.progress-bar {
    height:6px;
    width:0%;
    background:red;
}

.btn {
    display:none;
    margin-top:20px;
    padding:15px 25px;
    background:red;
    color:#fff;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
    <div class="loader"></div>
    <p>Memuat video, harap tunggu...</p>
</div>

<!-- MAIN -->
<div id="main">

<h2>🔥 Video Ini Lagi Viral 🔥</h2>

<div class="video-box" onclick="startVideo()">
    <video id="myVideo">
        <source src="vdeyss.mp4" type="video/mp4">
    </video>
    <div class="play-btn" id="playBtn">▶</div>
</div>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<!-- Banner Adsterra -->
<div style="margin-top:20px;">
<script>
atOptions = {
    key: '26813880',
    format: 'iframe',
    height: 250,
    width: 300,
    params: {}
};
</script>
<script src="//www.topcreativeformat.com/26813880/invoke.js"></script>
</div>

<a href="#" class="btn" id="btnNext" onclick="nextAd()">LANJUT NONTON</a>

</div>

<script>
// loading delay
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
}, 2500);

let firstClick = false;

function startVideo() {
    let video = document.getElementById("myVideo");
    let playBtn = document.getElementById("playBtn");

    if (!firstClick) {
        window.open("https://injusticebakery.com/ky2ke53zw?key=f6a8bd8c5fa5e272c54364f2b859de84", "_blank");
        firstClick = true;
    }

    video.play();
    playBtn.style.display = "none";

    video.ontimeupdate = function() {
        let percent = (video.currentTime / video.duration) * 100;
        document.getElementById("progressBar").style.width = percent + "%";

        if (percent > 35) {
            document.getElementById("btnNext").style.display = "inline-block";
        }
    };
}

function nextAd() {
    window.open("https://injusticebakery.com/ky2ke53zw?key=f6a8bd8c5fa5e272c54364f2b859de84", "_blank");
}
</script>

</body>
</html>
